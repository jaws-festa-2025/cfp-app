on:
  push:
    branches:
      # - kaigionrails
      - "jaws-ug"
jobs:
  build:
    runs-on: ubuntu-latest
    if: "${{ github.repository == 'jaws-festa-2025/cfp-app' }}"
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-skip-session-tagging: false
          role-to-assume: ${{ secrets.IAM_ROLE_PUSH_ECR }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: "${{ steps.login-ecr.outputs.registry }}/cfp-app"
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: "."
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: "deploy"
      cancel-in-progress: false
    needs: ["build"]
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ap-northeast-1
    steps:
      - run: sudo apt-get update && sudo apt-get install jsonnet
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-skip-session-tagging: false
          role-to-assume: ${{ secrets.IAM_ROLE_DEPLOY_ECS }}
      - uses: kayac/ecspresso@v2
        with:
          version: latest
      - run: IMAGE_TAG=${{ github.sha }} ecspresso run --config deploy/ecspresso.yml --overrides-file deploy/ecs-task-def-db-migrate.json
      - run: IMAGE_TAG=${{ github.sha }} ecspresso deploy --config deploy/ecspresso.yml
      - run: IMAGE_TAG=${{ github.sha }} ecspresso deploy --config deploy/ecspresso-worker.yml
