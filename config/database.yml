default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5

development:
  <<: *default
  database: cfp_app_development

test:
  <<: *default
  database: cfp_app_test

production:
  adapter: postgresql
  encoding: unicode
  # url:  <%= ENV["DATABASE_URL"] %>
  username: <%= ENV["DATABASE_USERNAME"] %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV["DATABASE_HOST"] || "localhost" %>
  database: cfp_app
  pool: <%= ENV["DB_POOL"] || ENV['MAX_THREADS'] || 5 %>
